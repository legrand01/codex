services:
  app:
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DEMO_MODE=false
      - AUTH_REQUIRED=true
      - AGENT_AUTH_REQUIRED=true
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN:?BOOTSTRAP_ADMIN_TOKEN is required}
      - WRITE_EXECUTION_ENABLED=false
      - PRODUCTION_WRITE_ENABLED=false
      - PRODUCTION_WRITE_CONFIRMATION=
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DEMO_MODE=false
      - AUTH_REQUIRED=true
      - AGENT_AUTH_REQUIRED=true
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN:?BOOTSTRAP_ADMIN_TOKEN is required}
      - WRITE_EXECUTION_ENABLED=false
      - PRODUCTION_WRITE_ENABLED=false
      - PRODUCTION_WRITE_CONFIRMATION=
      - DBTUNE_LAB_TARGET_DSN=postgresql://dbtune:dbtune-lab-only@target-postgres:5432/dbtune_target
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    ports:
      - "0.0.0.0:${STAGING_HTTPS_PORT:-18443}:443"
    volumes:
      - ./ops/staging/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.staging/secrets/tls.crt:/run/secrets/tls.crt:ro
      - ./.staging/secrets/tls.key:/run/secrets/tls.key:ro
    security_opt:
      - no-new-privileges:true

  postgres:
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
    security_opt:
      - no-new-privileges:true

  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --protected-mode
      - "no"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping | grep -q PONG",
        ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v3.5.0@sha256:63805ebb8d2b3920190daf1cb14a60871b16fd38bed42b857a3182bc621f4996
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./ops/staging/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/staging/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-19090}:9090"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    profiles: ["observability"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./.staging/generated/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-19093}:9093"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  backup:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    profiles: ["operations"]
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER:?POSTGRES_USER is required}
      - PGPASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - PGDATABASE=${POSTGRES_DB:?POSTGRES_DB is required}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-3600}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./ops/staging/run-backups.sh:/usr/local/bin/run-backups.sh:ro
      - staging_backups:/backups
    command: ["/bin/sh", "/usr/local/bin/run-backups.sh"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  prometheus_data:
  alertmanager_data:
  staging_backups:
