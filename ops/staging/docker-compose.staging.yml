services:
  app:
    build:
      args:
        RELEASE_COMMIT_SHA: ${RELEASE_COMMIT_SHA:?RELEASE_COMMIT_SHA is required}
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DEMO_MODE=false
      - AUTH_REQUIRED=true
      - AGENT_AUTH_REQUIRED=true
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN:?BOOTSTRAP_ADMIN_TOKEN is required}
      - WRITE_EXECUTION_ENABLED=false
      - PRODUCTION_WRITE_ENABLED=false
      - PRODUCTION_WRITE_CONFIRMATION=
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    build:
      args:
        RELEASE_COMMIT_SHA: ${RELEASE_COMMIT_SHA:?RELEASE_COMMIT_SHA is required}
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DEMO_MODE=false
      - AUTH_REQUIRED=true
      - AGENT_AUTH_REQUIRED=true
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN:?BOOTSTRAP_ADMIN_TOKEN is required}
      - WRITE_EXECUTION_ENABLED=false
      - PRODUCTION_WRITE_ENABLED=false
      - PRODUCTION_WRITE_CONFIRMATION=
      - DBTUNE_LAB_TARGET_DSN=postgresql://${TARGET_AGENT_USER:?TARGET_AGENT_USER is required}:${TARGET_AGENT_PASSWORD:?TARGET_AGENT_PASSWORD is required}@target-postgres:5432/dbtune_target
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  control-role-init:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_MIGRATION_PASSWORD=${POSTGRES_MIGRATION_PASSWORD:?POSTGRES_MIGRATION_PASSWORD is required}
      - POSTGRES_RUNTIME_PASSWORD=${POSTGRES_RUNTIME_PASSWORD:?POSTGRES_RUNTIME_PASSWORD is required}
      - POSTGRES_BACKUP_PASSWORD=${POSTGRES_BACKUP_PASSWORD:?POSTGRES_BACKUP_PASSWORD is required}
    volumes:
      - ./docker/dbtune-control/init-roles.sh:/usr/local/bin/init-roles.sh:ro
    command: ["/bin/sh", "/usr/local/bin/init-roles.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  migrate:
    build:
      args:
        RELEASE_COMMIT_SHA: ${RELEASE_COMMIT_SHA:?RELEASE_COMMIT_SHA is required}
    command:
      - sh
      - -c
      - python -m backend.db.init_db && python -m backend.db.staging_roles
    environment:
      - DATABASE_URL=${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required}
    depends_on:
      control-role-init:
        condition: service_completed_successfully

  frontend:
    build:
      args:
        RELEASE_COMMIT_SHA: ${RELEASE_COMMIT_SHA:?RELEASE_COMMIT_SHA is required}
    ports:
      - "0.0.0.0:${STAGING_HTTPS_PORT:-18443}:443"
    volumes:
      - ./ops/staging/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.staging/secrets/tls.crt:/run/secrets/tls.crt:ro
      - ./.staging/secrets/tls.key:/run/secrets/tls.key:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-check-certificate",
          "-q",
          "-O",
          "/dev/null",
          "https://127.0.0.1:443/health/ready",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  postgres:
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_MIGRATION_PASSWORD=${POSTGRES_MIGRATION_PASSWORD:?POSTGRES_MIGRATION_PASSWORD is required}
      - POSTGRES_RUNTIME_PASSWORD=${POSTGRES_RUNTIME_PASSWORD:?POSTGRES_RUNTIME_PASSWORD is required}
      - POSTGRES_BACKUP_PASSWORD=${POSTGRES_BACKUP_PASSWORD:?POSTGRES_BACKUP_PASSWORD is required}
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --protected-mode
      - "no"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping | grep -q PONG",
        ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v3.5.0@sha256:63805ebb8d2b3920190daf1cb14a60871b16fd38bed42b857a3182bc621f4996
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./ops/staging/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/staging/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-19090}:9090"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    profiles: ["observability"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./.staging/generated/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-19093}:9093"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  alert-sink:
    image: python:3.11-slim@sha256:db3ff2e1800a8581e2c48a27c3995339d47bdf046da21c7627accd3d51053a93
    profiles: ["local-observability"]
    command: ["python", "/opt/dbtune/alert_sink.py"]
    environment:
      - ALERT_SINK_OUTPUT=/alerts/alerts.jsonl
    volumes:
      - ./ops/staging/alert_sink.py:/opt/dbtune/alert_sink.py:ro
      - ./artifacts/staging-alerts:/alerts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9099/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  target-postgres:
    environment:
      - POSTGRES_USER=${TARGET_POSTGRES_USER:?TARGET_POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${TARGET_POSTGRES_PASSWORD:?TARGET_POSTGRES_PASSWORD is required}
      - POSTGRES_DB=dbtune_target
      - POSTGRES_AGENT_USER=${TARGET_AGENT_USER:?TARGET_AGENT_USER is required}
      - POSTGRES_AGENT_PASSWORD=${TARGET_AGENT_PASSWORD:?TARGET_AGENT_PASSWORD is required}
      - POSTGRES_WORKLOAD_USER=${TARGET_WORKLOAD_USER:?TARGET_WORKLOAD_USER is required}
      - POSTGRES_WORKLOAD_PASSWORD=${TARGET_WORKLOAD_PASSWORD:?TARGET_WORKLOAD_PASSWORD is required}
    cpus: "${STAGING_TARGET_POSTGRES_CPUS:-2.0}"
    mem_limit: "${STAGING_TARGET_POSTGRES_MEMORY:-2g}"
    pids_limit: 128
    security_opt:
      - no-new-privileges:true

  target-host-agent:
    build:
      args:
        RELEASE_COMMIT_SHA: ${RELEASE_COMMIT_SHA:?RELEASE_COMMIT_SHA is required}
    environment:
      - PG_CONNECTION_STRING=postgresql://${TARGET_AGENT_USER:?TARGET_AGENT_USER is required}:${TARGET_AGENT_PASSWORD:?TARGET_AGENT_PASSWORD is required}@target-postgres:5432/dbtune_target

  target-workload:
    environment:
      - PGUSER=${TARGET_WORKLOAD_USER:?TARGET_WORKLOAD_USER is required}
      - PGPASSWORD=${TARGET_WORKLOAD_PASSWORD:?TARGET_WORKLOAD_PASSWORD is required}
      - PGBENCH_CLIENTS=${STAGING_PGBENCH_CLIENTS:-2}
      - PGBENCH_JOBS=${STAGING_PGBENCH_JOBS:-2}
      - PGBENCH_RATE=${STAGING_PGBENCH_RATE:-2}
      - PGBENCH_DURATION_SECONDS=60
      - PGBENCH_PROGRESS_SECONDS=10
    cpus: "${STAGING_TARGET_WORKLOAD_CPUS:-0.5}"
    mem_limit: "${STAGING_TARGET_WORKLOAD_MEMORY:-128m}"
    pids_limit: 32
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  backup:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    profiles: ["operations"]
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=dbtune_backup
      - PGPASSWORD=${POSTGRES_BACKUP_PASSWORD:?POSTGRES_BACKUP_PASSWORD is required}
      - PGDATABASE=${POSTGRES_DB:?POSTGRES_DB is required}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-3600}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./ops/staging/run-backups.sh:/usr/local/bin/run-backups.sh:ro
      - staging_backups:/backups
    command: ["/bin/sh", "/usr/local/bin/run-backups.sh"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  prometheus_data:
  alertmanager_data:
  staging_backups:
