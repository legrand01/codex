name: release-gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
      - name: Type-check production staging additions
        run: >-
          mypy --strict --follow-imports=skip
          backend/services/operational_health.py
          scripts/staging_init.py
          scripts/staging_preflight.py
          scripts/provision_staging_lab.py
          scripts/staging_drills.py
          scripts/drill_regression_rollback.py
          scripts/staging_soak.py
      - name: Python dependency audit
        run: |
          python -m pip install pip-audit
          pip-audit --requirement requirements.lock

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate development compose model
        run: docker compose config --quiet
      - name: Validate staging compose model
        env:
          CORS_ORIGINS: '["https://staging.example"]'
          BOOTSTRAP_ADMIN_TOKEN: test-only-token-that-is-longer-than-32-characters
          POSTGRES_USER: dbtune_control
          POSTGRES_PASSWORD: test-only-password-that-is-long
          POSTGRES_DB: dba_agent
          CONTROL_DATABASE_URL: postgresql://dbtune_control:test@postgres:5432/dba_agent
          REDIS_PASSWORD: test-only-redis-password-that-is-long
          CONTROL_REDIS_URL: redis://:test-only-redis-password-that-is-long@redis:6379/0
        run: >-
          docker compose
          -f docker-compose.yml
          -f ops/staging/docker-compose.staging.yml
          --profile observability
          --profile operations
          config --quiet
      - name: Build production images
        run: docker compose build app frontend worker migrate
      - name: Validate shell scripts
        run: bash -n scripts/*.sh ops/staging/*.sh
