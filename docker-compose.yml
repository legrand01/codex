services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dba_agent
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=${DEBUG:-false}
      - DEMO_MODE=${DEMO_MODE:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - AUTH_REQUIRED=${AUTH_REQUIRED:-true}
      - AGENT_AUTH_REQUIRED=${AGENT_AUTH_REQUIRED:-true}
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN:-}
      - EVIDENCE_CLEANUP_ENABLED=${EVIDENCE_CLEANUP_ENABLED:-true}
      - EVIDENCE_RAW_RETENTION_DAYS=${EVIDENCE_RAW_RETENTION_DAYS:-30}
      - EVIDENCE_REFERENCED_RETENTION_DAYS=${EVIDENCE_REFERENCED_RETENTION_DAYS:-90}
      - EVIDENCE_ROLLUP_RETENTION_DAYS=${EVIDENCE_ROLLUP_RETENTION_DAYS:-365}
      - EVIDENCE_CLEANUP_INTERVAL_SECONDS=${EVIDENCE_CLEANUP_INTERVAL_SECONDS:-3600}
      - EVIDENCE_CLEANUP_BATCH_SIZE=${EVIDENCE_CLEANUP_BATCH_SIZE:-1000}
      - EVIDENCE_CLEANUP_MAX_BATCHES=${EVIDENCE_CLEANUP_MAX_BATCHES:-20}
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: ["python", "-m", "backend.workers.run_worker"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dba_agent
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - WRITE_EXECUTION_ENABLED=${WRITE_EXECUTION_ENABLED:-false}
      - PRODUCTION_WRITE_ENABLED=${PRODUCTION_WRITE_ENABLED:-false}
      - PRODUCTION_WRITE_CONFIRMATION=${PRODUCTION_WRITE_CONFIRMATION:-}
      - AUTH_REQUIRED=${AUTH_REQUIRED:-true}
      - AGENT_AUTH_REQUIRED=${AGENT_AUTH_REQUIRED:-true}
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN:-}
      - EVIDENCE_CLEANUP_ENABLED=${EVIDENCE_CLEANUP_ENABLED:-true}
      - EVIDENCE_RAW_RETENTION_DAYS=${EVIDENCE_RAW_RETENTION_DAYS:-30}
      - EVIDENCE_REFERENCED_RETENTION_DAYS=${EVIDENCE_REFERENCED_RETENTION_DAYS:-90}
      - EVIDENCE_ROLLUP_RETENTION_DAYS=${EVIDENCE_ROLLUP_RETENTION_DAYS:-365}
      - EVIDENCE_CLEANUP_INTERVAL_SECONDS=${EVIDENCE_CLEANUP_INTERVAL_SECONDS:-3600}
      - EVIDENCE_CLEANUP_BATCH_SIZE=${EVIDENCE_CLEANUP_BATCH_SIZE:-1000}
      - EVIDENCE_CLEANUP_MAX_BATCHES=${EVIDENCE_CLEANUP_MAX_BATCHES:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  host-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: ["python", "host_agent/agent.py"]
    healthcheck:
      disable: true
    profiles: ["host-agent"]
    environment:
      - CONTROL_PLANE_URL=http://app:8000
      - AGENT_HOST_ID=${AGENT_HOST_ID:-}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - AGENT_INSTANCE_ID=${AGENT_INSTANCE_ID:-}
      - AGENT_AUTH_REQUIRED=${AGENT_AUTH_REQUIRED:-true}
      - AGENT_HOSTNAME=${AGENT_HOSTNAME:-w2j}
      - PG_CONNECTION_STRING=${PG_CONNECTION_STRING:-postgresql://pgai_user@host.docker.internal:5444/w2jmon_test?sslmode=require}
      - PG_SETTINGS_INTERVAL=${PG_SETTINGS_INTERVAL:-60}
      - PG_STATS_INTERVAL=${PG_STATS_INTERVAL:-30}
      - LOCKS_REPLICATION_INTERVAL=${LOCKS_REPLICATION_INTERVAL:-15}
      - OS_METRICS_INTERVAL=${OS_METRICS_INTERVAL:-15}
      - MAX_QUERY_ENTRIES=${MAX_QUERY_ENTRIES:-100}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30}
      - RESTART_CAPABILITY=${RESTART_CAPABILITY:-false}
      - PROVIDER_API_CAPABILITY=${PROVIDER_API_CAPABILITY:-false}
      - MANAGED_FILE_ACCESS=${MANAGED_FILE_ACCESS:-false}
      - MANAGED_CONF_PATH=${MANAGED_CONF_PATH:-}
      - COMMAND_POLL_INTERVAL=${COMMAND_POLL_INTERVAL:-2}
      - BUFFER_DIR=/var/lib/dbtune-agent/buffer
      - BUFFER_MAX_BYTES=${BUFFER_MAX_BYTES:-536870912}
    depends_on:
      app:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - host_agent_buffer:/var/lib/dbtune-agent

  postgres:
    image: postgres:16-alpine
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-dba_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  target-postgres:
    image: postgres:16-alpine
    profiles: ["tuning-lab"]
    ports:
      - "${TARGET_PG_PORT:-55433}:5432"
    environment:
      - POSTGRES_USER=dbtune
      - POSTGRES_PASSWORD=dbtune-lab-only
      - POSTGRES_DB=dbtune_target
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
      - -c
      - log_min_duration_statement=500
    volumes:
      - target_postgres_data:/var/lib/postgresql/data
      - ./docker/dbtune-target/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./docker/dbtune-target/20-managed-conf.sh:/docker-entrypoint-initdb.d/20-managed-conf.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbtune -d dbtune_target"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  target-host-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: ["python", "host_agent/agent.py"]
    healthcheck:
      disable: true
    profiles: ["tuning-lab"]
    user: "70:70"
    environment:
      - CONTROL_PLANE_URL=http://app:8000
      - AGENT_HOST_ID=${TARGET_AGENT_HOST_ID:-}
      - AGENT_TOKEN=${TARGET_AGENT_TOKEN:-}
      - AGENT_INSTANCE_ID=${TARGET_AGENT_INSTANCE_ID:-f9e89d36-f4cb-4f31-8b3a-e8a92fb4a916}
      - AGENT_AUTH_REQUIRED=${AGENT_AUTH_REQUIRED:-true}
      - AGENT_HOSTNAME=${TARGET_AGENT_HOSTNAME:-dbtune-target}
      - PG_CONNECTION_STRING=postgresql://dbtune:dbtune-lab-only@target-postgres:5432/dbtune_target
      - PG_SETTINGS_INTERVAL=10
      - PG_STATS_INTERVAL=5
      - LOCKS_REPLICATION_INTERVAL=5
      - OS_METRICS_INTERVAL=5
      - HEARTBEAT_INTERVAL=10
      - MANAGED_FILE_ACCESS=true
      - MANAGED_CONF_PATH=/var/lib/postgresql/data/conf.d/postgres_tune.conf
      - COMMAND_POLL_INTERVAL=1
      - BUFFER_DIR=/tmp/dbtune-agent-buffer
    depends_on:
      app:
        condition: service_healthy
      target-postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - target_postgres_data:/var/lib/postgresql/data

  target-workload:
    image: postgres:16-alpine
    profiles: ["tuning-lab"]
    environment:
      - PGHOST=target-postgres
      - PGPORT=5432
      - PGUSER=dbtune
      - PGPASSWORD=dbtune-lab-only
      - PGDATABASE=dbtune_target
    volumes:
      - ./docker/dbtune-target/transaction.sql:/workload/transaction.sql:ro
      - ./docker/dbtune-target/analytics.sql:/workload/analytics.sql:ro
      - ./docker/dbtune-target/run-workload.sh:/workload/run-workload.sh:ro
    command: ["/bin/sh", "/workload/run-workload.sh"]
    depends_on:
      target-postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  host_agent_buffer:
  target_postgres_data:
